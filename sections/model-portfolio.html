<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Model Portfolio - Explore Portfolios</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* Model Portfolio / Explore Portfolios - replicates the live Vault22 SA journey, Absa-skinned. Mock data. */
:root{
  --absa:#95052A; --absa-2:#77021E; --absa-3:#B4143F; --link:#B4143F;
  --green:#158B3A; --green-soft:#E7F6EC;
  --bg:#F4F5F6; --card:#fff; --line:#E6E7EA; --line-2:#DDDFE3;
  --ink:#1B2430; --ink-2:#3C4757; --muted:#6E7883; --muted-2:#98A2AF; --tile:#F3F4F6;
  --r:16px;
  --shadow:0 1px 2px rgba(16,24,40,.05); --shadow-lg:0 24px 50px -22px rgba(16,24,40,.35);
  --consv:#158B3A; --consv-bg:#E7F6EC; --caut:#0E7490; --caut-bg:#E0F2F7;
  --bal:#B45309; --bal-bg:#FEF3D6; --grow:#C2410C; --grow-bg:#FEEAD9; --aggr:#B4143F; --aggr-bg:#FCE7EC;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.3px}
.wrap{max-width:1180px;margin:0 auto;padding:22px 30px 60px}
.muted{color:var(--muted)} .dnum{font-variant-numeric:tabular-nums}
.link{color:var(--link);font-weight:600;cursor:pointer}.link:hover{text-decoration:underline}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14.5px;transition:.16s;border:1.5px solid transparent}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--absa);color:#fff}.btn-primary:hover{background:var(--absa-2)}
.btn-primary:disabled{background:#D9AEB9;cursor:not-allowed}
.btn-outline{background:#fff;border-color:var(--absa);color:var(--absa)}.btn-outline:hover{background:#FBF0F3}
.btn-block{width:100%}.btn-lg{padding:15px 22px;font-size:15px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

/* header row */
.mp-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
.mp-head h1{font-size:26px}
.tabs{display:flex;gap:8px;margin:4px 0 16px}
.tab{padding:9px 16px;border-radius:11px;font-weight:600;font-size:14px;color:var(--muted);border:1px solid transparent}
.tab:hover{color:var(--ink)}
.tab.on{background:#fff;color:var(--absa);border-color:var(--line)}
.intro-card{display:flex;align-items:center;gap:18px;border-radius:var(--r);padding:20px 22px;background:linear-gradient(120deg,var(--absa),var(--absa-2));color:#fff;margin-bottom:14px}
.intro-card .t{font-weight:700;font-size:16px}.intro-card .s{font-size:13px;opacity:.9;margin-top:2px}
.intro-card .btn{margin-left:auto;background:#fff;color:var(--absa)}
.filterbar{display:flex;align-items:center;gap:12px;margin:18px 0 12px}
.filterbar h2{font-size:17px;margin-right:auto}
.chip{padding:8px 14px;border-radius:20px;background:#fff;border:1px solid var(--line-2);font-size:13px;font-weight:600;color:var(--ink-2);transition:.15s}
.chip:hover{border-color:var(--absa);color:var(--absa)}
.chip.on{background:var(--absa);border-color:var(--absa);color:#fff}

/* two-column */
.mp-grid{display:grid;grid-template-columns:1fr 420px;gap:20px;align-items:start}
@media(max-width:1000px){.mp-grid{grid-template-columns:1fr}.detail-col{display:none}.detail-col.mobile-show{display:block;position:fixed;inset:0;z-index:40;background:var(--bg);overflow:auto;padding:16px}}
.plist{display:flex;flex-direction:column;gap:12px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.16s}
.pcard:hover{border-color:var(--line-2);box-shadow:var(--shadow)}
.pcard.sel{border-color:var(--absa);box-shadow:0 0 0 1px var(--absa)}
.pcard .tags{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.rtag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.reg{font-size:12px;color:var(--muted)}
.pcard .nm{font-weight:700;font-size:15px;line-height:1.3}
.prov{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);font-weight:600;margin:6px 0}
.prov .plogo{width:16px;height:16px;border-radius:4px;background:var(--absa);display:inline-grid;place-items:center;color:#fff;font-size:9px;font-weight:800}
.pcard .desc{font-size:12.5px;color:var(--muted);line-height:1.45;margin:6px 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pcard .bf{font-size:12px;margin-top:8px}.pcard .bf b{color:var(--ink-2)}
.pcard .mi{font-size:12.5px;font-weight:600;margin-top:6px}

/* detail panel */
.detail-col{position:sticky;top:16px}
.detail{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.detail .close-m{display:none}
@media(max-width:1000px){.detail .close-m{display:inline-flex;float:right}}
.detail .tags{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.detail h3{font-size:18px;line-height:1.25}
.detail .desc{font-size:13px;color:var(--ink-2);line-height:1.55;margin:12px 0}
.kv{padding:10px 0;border-top:1px solid var(--line)}
.kv .k{font-size:12px;color:var(--muted)}.kv .v{font-weight:700;font-size:14px}
.chart-tf{display:flex;gap:6px;justify-content:center;margin:12px 0 4px}
.chart-tf button{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted)}
.chart-tf button.on{background:var(--absa);color:#fff}
.factsheet{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-top:14px;cursor:pointer}
.factsheet .pdf{width:34px;height:34px;border-radius:8px;background:#FBE9EE;color:var(--absa);display:grid;place-items:center;font-size:10px;font-weight:800}
.empty-detail{display:grid;place-items:center;min-height:320px;color:var(--muted-2);text-align:center;font-size:14px;padding:30px}

/* drawer (invest) */
.scrim{position:fixed;inset:0;background:rgba(16,24,40,.42);opacity:0;pointer-events:none;transition:.25s;z-index:50}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(460px,100vw);background:#F7F8F9;box-shadow:var(--shadow-lg);transform:translateX(102%);transition:.3s cubic-bezier(.2,.8,.2,1);z-index:60;display:flex;flex-direction:column}
.drawer.show{transform:none}
.dh{display:flex;align-items:center;gap:12px;padding:18px 20px;background:#fff;border-bottom:1px solid var(--line)}
.dh h3{flex:1;text-align:center;font-size:16px}
.dh button{width:34px;height:34px;border-radius:10px;display:grid;place-items:center}.dh button:hover{background:var(--tile)}
.db{flex:1;overflow:auto;padding:20px}
.df{padding:16px 20px;background:#fff;border-top:1px solid var(--line)}
.fl{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:8px}
.amt{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:15px 16px;margin-bottom:10px}
.amt .c{font-weight:700;color:var(--muted)}
.amt input{flex:1;border:none;outline:none;font-size:20px;font-weight:700;text-align:right;font-family:inherit;width:100%}
.qc{display:flex;gap:8px;flex-wrap:wrap}
.acct{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.acct .an{font-weight:600;font-size:14px}.acct .am{font-size:12px;color:var(--muted)}.acct .ab{margin-left:auto;font-weight:600;font-size:13px;color:var(--ink-2)}
/* CASA account selector - mirrors the Absa MMF Buy flow account picker (sections/investments.html) */
.selbox{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:15px 16px;cursor:pointer}
.selbox.open{border-color:var(--absa)}
.selbox .an{font-weight:700;font-size:14.5px}.selbox .am{font-size:13px;color:var(--muted);margin-top:1px}
.selbox .ab{margin-left:auto;font-weight:600;font-size:13.5px;color:var(--ink-2)}
.selbox .cv{color:var(--absa);display:inline-flex}.selbox .cv svg{width:20px;height:20px;transition:.2s}
.acct-list{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-lg);z-index:5;overflow:hidden}
.acct-opt{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
.acct-opt:last-child{border-bottom:none}
.acct-opt:hover{background:var(--tile)}
.acct-opt.on{background:var(--absa);color:#fff}
.acct-opt .an{font-weight:700;font-size:14px}.acct-opt .am{font-size:12px;opacity:.85}
.acct-opt .ab{margin-left:auto;font-weight:700;font-size:13.5px}
.sumc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:2px 16px}
.sl{display:flex;justify-content:space-between;padding:13px 0;font-size:14px;border-bottom:1px solid var(--line)}.sl:last-child{border:none}.sl.tot{font-weight:700}.sl .k{color:var(--muted)}
.success{text-align:center;padding:34px 18px}
.sic{width:80px;height:80px;margin:0 auto 16px}
.sic circle{stroke-dasharray:200;stroke-dashoffset:200;animation:dr .6s .1s forwards}.sic path{stroke-dasharray:60;stroke-dashoffset:60;animation:dr .4s .5s forwards}
@keyframes dr{to{stroke-dashoffset:0}}
.disc{display:flex;gap:9px;background:#FFF8EC;border:1px solid #FCE4B6;border-radius:12px;padding:12px 14px;font-size:12px;color:#93610B;line-height:1.5;margin-top:14px}
.disc svg{width:16px;flex:none;margin-top:1px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;z-index:120;box-shadow:var(--shadow-lg);opacity:0;transition:.25s}
.toast.show{opacity:1}

/* ===== Fact sheet + Risk-profile inline views ===== */
.sheetview{position:fixed;inset:0;background:var(--bg);z-index:70;overflow-y:auto;display:none}
.sheetview.show{display:block}
.sheet-wrap{max-width:1180px;margin:0 auto;padding:22px 30px 60px}
.sheet-back{display:inline-flex;align-items:center;gap:6px;color:var(--absa);font-weight:600;font-size:14px;margin-bottom:16px}
.sheet-back:hover{text-decoration:underline}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.sheet-head h1{font-size:24px;line-height:1.25;max-width:760px}
.sheet-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
@media(max-width:900px){.sheet-grid{grid-template-columns:1fr}}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:640px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.stat .k{font-size:11.5px;color:var(--muted)}.stat .v{font-weight:700;font-size:18px;margin-top:3px}
.stat .v.pos{color:var(--green)}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h3{font-size:15px;margin-bottom:14px}
.alloc-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.alloc-row .lbl{width:120px;font-size:13px;color:var(--ink-2);flex:none}
.alloc-row .track{flex:1;height:9px;background:var(--tile);border-radius:9999px;overflow:hidden}
.alloc-row .fill{height:100%;border-radius:9999px}
.alloc-row .pct{width:44px;text-align:right;font-weight:700;font-size:13px;flex:none}
.perf-tbl{width:100%;border-collapse:collapse;font-size:13px}
.perf-tbl th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 8px}
.perf-tbl td{padding:9px 8px;border-top:1px solid var(--line);font-variant-numeric:tabular-nums}
.perf-tbl td.pos{color:var(--green);font-weight:600}.perf-tbl td.neg{color:var(--aggr);font-weight:600}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:6px 0 22px}
@media(max-width:900px){.style-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.style-grid{grid-template-columns:1fr}}
.style-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.16s;text-align:left}
.style-card:hover{border-color:var(--line-2);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.style-card.sel{border-color:var(--absa);box-shadow:0 0 0 1px var(--absa)}
.style-band{padding:7px 14px;font-size:12px;font-weight:700;letter-spacing:.2px}
.style-body{padding:14px 16px 16px;display:flex;gap:12px}
.style-body .ic{width:40px;height:40px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:19px}
.style-body .st{font-weight:700;font-size:15px;margin-bottom:4px}
.style-body .sd{font-size:12.5px;color:var(--muted);line-height:1.45}
.progress{height:6px;background:var(--tile);border-radius:9999px;overflow:hidden;margin:14px 0 20px}
.progress .p{height:100%;background:var(--absa);border-radius:9999px;transition:width .3s}
.quiz-list{display:flex;flex-direction:column;gap:10px;max-width:720px}
.quiz-opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;font-size:14.5px;font-weight:500;color:var(--ink);transition:.14s}
.quiz-opt:hover{border-color:var(--absa);background:#FBF0F3}
.quiz-opt.sel{border-color:var(--absa);background:#FBF0F3;box-shadow:0 0 0 1px var(--absa)}
.quiz-opt .qradio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line-2);flex:none;transition:.14s;position:relative}
.quiz-opt.sel .qradio{border-color:var(--absa)}
.quiz-opt.sel .qradio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--absa)}
</style>
</head>
<body>
<div class="wrap">
  <div class="mp-head"><h1>My Investments</h1><button class="btn btn-primary" onclick="openInvest(state.sel||PRODUCTS[0].id)">+ Make an investment</button></div>
  <div class="tabs">
    <button class="tab" id="tab-mine" onclick="setTab('mine')">My Investments</button>
    <button class="tab on" id="tab-explore" onclick="setTab('explore')">Explore Portfolios</button>
  </div>
  <div class="intro-card">
    <div><div class="t">Let us help you choose the right investments for your goals</div><div class="s">Set your risk profile and see portfolios matched to you. Takes about 60 seconds.</div></div>
    <button class="btn" onclick="openRisk()">Start here</button>
  </div>
  <div class="filterbar">
    <h2 id="listTitle">All Investment Products</h2>
    <div id="filters"></div>
  </div>
  <div class="mp-grid">
    <div class="plist" id="plist"></div>
    <div class="detail-col" id="detailCol"><div class="detail"><div class="empty-detail">Select a portfolio<br/>to view details</div></div></div>
  </div>
</div>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div id="dwin"></div></div>
<!-- Fact sheet (item 5) and Risk-profile flow (item 6): full inline views, Absa-skinned, ZAR -->
<div class="sheetview" id="sheet"></div>
<div class="sheetview" id="risk"></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const zar=n=>'R '+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

const RISK={Conservative:['--consv','--consv-bg'],'Cautious Risk':['--caut','--caut-bg'],Cautious:['--caut','--caut-bg'],Balanced:['--bal','--bal-bg'],Growth:['--grow','--grow-bg'],Aggressive:['--aggr','--aggr-bg']};
function rtag(r){const c=RISK[r]||RISK.Balanced;return `<span class="rtag" style="color:var(${c[0]});background:var(${c[1]})">${esc(r)}</span>`;}

/* Products captured from live SA Explore Portfolios (house model portfolios shown as Absa in the Absa shell). */
const PRODUCTS=[
 {id:'no-div-sa',risk:'Conservative',reg:'South Africa',name:'Ninety One Diversified Income Prescient Feeder Actively Managed ETF',prov:'Ninety One',pl:'N1',term:'2 years',min:500,seed:11,
  desc:'The Ninety One Diversified Income Prescient Feeder AMETF is a feeder fund and an actively managed ETF listed on the JSE. The portfolio consists solely of participatory interests in the Ninety One Diversified Income Fund, aiming to provide a high level of income while seeking to maximise capital growth.'},
 {id:'no-div-gl',risk:'Conservative',reg:'Global',name:'Ninety One Global Diversified Income Prescient Feeder Actively Managed ETF',prov:'Ninety One',pl:'N1',term:'2 years',min:500,seed:12,
  desc:'Global Diversified Income Prescient Feeder Actively Managed ETF. Provides diversified global income exposure through an actively managed feeder structure.'},
 {id:'absa-conserv',risk:'Conservative',reg:'SA',name:'Absa Conservative Portfolio',prov:'Absa',pl:'A',term:'3 years',min:500,seed:21,
  desc:'A South African-focussed, conservative fixed-income portfolio investing in ETFs and unit trusts. The neutral asset allocation is >90% in fixed income. The portfolio aims to outperform cash over time.'},
 {id:'prescient-pip',risk:'Conservative',reg:'SA',name:'Prescient Income Provider (PIP) Feeder AMETF',prov:'Prescient',pl:'P',term:'2 years',min:500,seed:13,
  desc:'INVESTMENT AND RETURN OBJECTIVE: The Fund aims to return CPI + 3% per annum through a full interest rate cycle while providing stability by aiming never to lose capital over any rolling 3 month period.'},
 {id:'absa-cautious',risk:'Cautious Risk',reg:'SA',name:'Absa Cautious Portfolio',prov:'Absa',pl:'A',term:'3 years',min:500,seed:22,
  desc:'A South African-focused, cautious multi-asset portfolio investing in ETFs and unit trusts. The neutral asset allocation is 75% fixed income and 25% equities. The portfolio aims to outperform inflation over time.'},
 {id:'satrix-bal2',risk:'Balanced',reg:'SA',name:'Satrix Global Balanced Fund of Funds ETF (2)',prov:'Satrix',pl:'S',term:'5 years',min:500,seed:14,
  desc:'INVESTMENT MANDATE: The Satrix Multi Asset Passive Portfolio Solutions Growth SA ETF Portfolio offers investors exposure to multi-asset classes. The Satrix MAPPS Growth SA ETF Portfolio replicates the total return.'},
 {id:'absa-balanced',risk:'Balanced',reg:'SA',name:'Absa Balanced Portfolio',prov:'Absa',pl:'A',term:'5 years',min:500,seed:23,
  desc:'A South African-focused, balanced multi-asset portfolio investing in ETFs and unit trusts. The neutral asset allocation is 50% fixed income and 50% equities. The portfolio aims to outperform inflation over time.'},
 {id:'satrix-bal1',risk:'Balanced',reg:'SA',name:'Satrix Global Balanced Fund of Funds ETF (1)',prov:'Satrix',pl:'S',term:'5 years',min:500,seed:15,
  desc:'INVESTMENT MANDATE: The Satrix Multi Asset Passive Portfolio Solutions Protect (MAPPS) SA ETF Portfolio is a uniquely designed ETF which offers investors exposure to multi-asset classes.'},
 {id:'absa-growth',risk:'Growth',reg:'SA',name:'Absa Growth Portfolio',prov:'Absa',pl:'A',term:'7 years',min:500,seed:24,
  desc:'A South African-focused, growth multi-asset portfolio investing in ETFs and unit trusts. The neutral asset allocation is 25% fixed income and 75% equities. The portfolio aims to outperform inflation over time.'},
 {id:'coro-growth',risk:'Growth',reg:'Global',name:'Coronation Global Optimum Growth Prescient Feeder AMETF',prov:'Coronation',pl:'C',term:'7 years',min:500,seed:16,
  desc:"WHAT IS THE FUND'S OBJECTIVE? The fund aims to maximise long-term investment growth by investing in a globally diversified portfolio with exposure to both developed and emerging markets across multiple asset classes."},
 {id:'absa-aggr',risk:'Aggressive',reg:'SA',name:'Absa Aggressive Portfolio',prov:'Absa',pl:'A',term:'10 years',min:500,seed:25,
  desc:'A global equity portfolio investing in ETFs and unit trusts. The neutral asset allocation is a minimum of 80% in equities. The portfolio aims to outperform most asset classes.'},
 {id:'coro-equity',risk:'Aggressive',reg:'Global',name:'Coronation Global Equity Select Prescient Feeder AMETF',prov:'Coronation',pl:'C',term:'10 years',min:500,seed:17,
  desc:"WHAT IS THE FUND'S OBJECTIVE? The fund aims to give investors access to the best opportunities in global equity markets. The fund is biased to developed markets and actively seeks out attractively valued shares to buy."}
];
const FILTERS=['All','Conservative','Cautious Risk','Balanced','Growth','Aggressive','SA','Global'];
const state={tab:'explore',filter:'All',sel:null,invest:{step:1,amount:0,acctOpen:false}};
/* Funding is ALWAYS the CASA account. There is no generic / alternative funding
   method in the portfolio flow - the selector below mirrors the Absa MMF Buy flow
   account picker, with the CASA account as its only option. */
const ACCOUNTS=[{name:'Absa Cheque Account',mask:'9012',balance:48250}];
const ACCOUNT=ACCOUNTS[0];
const chevD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
/* CASA account selector, styled + behaving like the MMF Buy flow's acctSelector. */

function filtered(){

  return l;
}
function seriesPath(seed,up,w,h){
  let a=seed>>>0;const rnd=()=>{a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};
  const n=40,end=(up?1:-.3)*(10+rnd()*30),vals=[0];for(let i=1;i<n;i++)vals.push(end*(i/(n-1))+(rnd()-.5)*Math.max(3,Math.abs(end)*.3));vals[n-1]=end;
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1,st=w/(n-1);
  const pts=vals.map((v,i)=>[i*st,h-6-((v-mn)/rg)*(h-14)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return {line,area:line+` L${w} ${h} L0 ${h} Z`};
}

function monthly(seed,r){
  let a=(seed*2654435761)>>>0;const rnd=()=>{a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};
  const vol=/Aggressive|Growth/.test(r)?2.6:(/Balanced/.test(r)?1.6:0.9), drift=/Conservative|Cautious/.test(r)?0.5:0.8;
  return MONTHS3.map(m=>({m,v:+(drift+(rnd()-0.42)*vol*2).toFixed(2)}));
}

const STYLES=[
  {key:'Ultra-Low',band:['--consv','--consv-bg'],ic:'🛡️',t:'Safety First',d:'You value capital preservation and stability, opting for an enhanced savings solution that avoids equity markets entirely.',match:'Conservative'},

  {key:'Balanced',band:['--bal','--bal-bg'],ic:'⚖️',t:'Balanced Approach',d:"You're comfortable balancing growth and stability, accepting normal market ups and downs to support long-term goals.",match:'Balanced'},
  {key:'Growth',band:['--grow','--grow-bg'],ic:'📈',t:'Growth-Orientated',d:"You're willing to accept higher volatility in pursuit of stronger long-term returns, while maintaining diversification.",match:'Growth'},
  {key:'Aggressive',band:['--aggr','--aggr-bg'],ic:'🚀',t:'Build for the Future',d:"You're focused on long-term capital growth and are comfortable with significant short-term market fluctuations along the way.",match:'Aggressive'},

/* Risk-assessment questionnaire (item 1) - questions/options/scoring VERBATIM from the
   live SA app's window.RA_RISK_QS / scoreRiskProfile (goals bundle). 3 Qs x 5 opts,
   score 0-4; sum 0-12 maps onto the six styles in the same buckets. Not a second set. */
const QUIZ_QS=[
  {q:'What is your primary investment goal?',opts:[
    {t:'I want to preserve my capital',s:0},
    {t:'I want moderate growth with low risk',s:1},
    {t:'I want balanced growth with moderate risk',s:2},
    {t:'I want aggressive growth with higher risk',s:3},
    {t:'I want to maximise returns and accept the highest risk',s:4}]},
  {q:'What is your attitude towards investment risk?',opts:[
    {t:'I prefer to avoid risk as much as possible',s:0},
    {t:"I'm willing to accept some risk for potential returns",s:1},
    {t:"I'm comfortable with moderate risk for higher potential returns",s:2},
    {t:"I'm willing to take significant risks for potentially higher returns",s:3},
    {t:'I actively seek high-risk opportunities for maximum returns',s:4}]},
  {q:'How would you react if your investments fell in value by 20% over the next 6 months?',opts:[
    {t:'I would sell immediately to limit my losses',s:0},
    {t:'I would be concerned but hold onto my investments',s:1},
    {t:'I would not be concerned and continue holding my investments',s:2},
    {t:'I would view it as an opportunity to buy more of the same investments',s:3},
    {t:'I would become more aggressive to take advantage of future growth',s:4}]},
];
function scoreStyle(ans){
  const raw=ans.reduce((a,i,idx)=>a+(i==null?0:QUIZ_QS[idx].opts[i].s),0);
  const idx=raw<=1?0:raw<=3?1:raw<=5?2:raw<=7?3:raw<=9?4:5;   // same buckets as scoreRiskProfile
  return {style:STYLES[idx],score:Math.round(raw/12*100)};
}
let riskSel=null, rmode='style', qIdx=0, qAns=[null,null,null], quizRes=null;
function openRisk(){ riskSel=null; rmode='style'; qIdx=0; qAns=[null,null,null]; quizRes=null; renderRisk(); $('#risk').classList.add('show'); $('#risk').scrollTop=0; }
function closeRisk(){ $('#risk').classList.remove('show'); }
function selectStyle(k){ riskSel=k; renderRisk(); }
function startQuiz(){ rmode='quiz'; qIdx=0; qAns=[null,null,null]; renderRisk(); $('#risk').scrollTop=0; }
function answerQuiz(i){

}

  const cards=STYLES.map(s=>`<button class="style-card ${riskSel===s.key?'sel':''}" onclick="selectStyle('${s.key}')">

  </button>`).join('');
  el.innerHTML=`<div class="sheet-wrap">
    <button class="sheet-back" onclick="closeRisk()">‹ New Investment Goal</button>
    <h1 style="font-size:24px;margin-bottom:2px">What is your investment style?</h1>
    <div class="progress"><div class="p" style="width:${riskSel?50:25}%"></div></div>
    <div class="style-grid">${cards}</div>
    <div style="display:flex;gap:12px;justify-content:center;max-width:640px;margin:0 auto">
      <button class="btn btn-primary btn-lg" style="flex:1" ${riskSel?'':'disabled'} onclick="confirmRisk()">Continue</button>
      <button class="btn btn-outline btn-lg" style="flex:1" onclick="startQuiz()">I'm not sure, help me</button>
    </div>
  </div>`;
}

/* Journey-aware Back (item 2): consume ONE step at a time, deepest first, so Back
   follows the real path: fact sheet -> portfolio detail -> Explore list ->
   Investments landing -> (shell pops) Home. Returns true when it handled a step. */
window.__absaBack=function(){
  if($('#risk').classList.contains('show')){
    if(rmode==='result'){ rmode='quiz'; qIdx=QUIZ_QS.length-1; renderRisk(); return true; }
    if(rmode==='quiz'){ if(qIdx>0){ qIdx--; renderRisk(); return true; } rmode='style'; renderRisk(); return true; }
    closeRisk(); return true;                                   // style step -> close overlay
  }
  if($('#sheet').classList.contains('show')){ closeSheet(); return true; }   // fact sheet -> detail
  if($('#drawer').classList.contains('show')){ closeDrawer(); return true; } // invest drawer -> detail
  if(state.sel){ deselect(); return true; }                    // portfolio detail -> Explore list
  try{ window.parent.go('investments'); return true; }catch(e){}// Explore list -> Investments landing
  return false;
};
window.__openRisk=openRisk;

render();
</script>
</body>
</html>
