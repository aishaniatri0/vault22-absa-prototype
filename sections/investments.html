<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABSA Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* Faithful replica of the live Absa Uganda investment app (absa-uganda-investment.dev), Absa-skinned. UGX. Desktop. Mock data. */
:root{
  --absa:#95052A; --absa-2:#77021E; --absa-3:#B4143F; --link:#B4143F;
  --green:#158B3A; --green-soft:#E7F6EC;
  --bg:#F4F5F6; --card:#fff; --line:#E7E8EA; --line-2:#DDDFE3;
  --ink:#1B2430; --ink-2:#3C4757; --muted:#6E7883; --muted-2:#9AA3AF; --tile:#F3F4F6;
  --r:16px;
  --shadow:0 1px 2px rgba(16,24,40,.05); --shadow-lg:0 24px 50px -22px rgba(16,24,40,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.3px}
.wrap{max-width:1180px;margin:0 auto;padding:22px 30px 60px}
.dnum{font-variant-numeric:tabular-nums} .muted{color:var(--muted)}
.link{color:var(--link);font-weight:600;cursor:pointer} .link:hover{text-decoration:underline}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:999px;font-weight:600;font-size:14.5px;transition:.16s;border:1.5px solid transparent;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--absa);color:#fff}.btn-primary:hover{background:var(--absa-2)}
.btn-primary:disabled{background:#D9AEB9;cursor:not-allowed}
.btn-outline{background:#fff;border-color:var(--absa);color:var(--absa)}.btn-outline:hover{background:#FBF0F3}
.btn-ghost{background:var(--tile);color:var(--ink);border-radius:12px}.btn-ghost:hover{background:#EAECEF}
.btn-block{width:100%}.btn-lg{padding:15px 22px;font-size:15px}
.icn{width:20px;height:20px;flex:none}

/* ===== two-column layout ===== */
.cols{display:grid;grid-template-columns:1fr 1.15fr;gap:26px;align-items:start}
@media(max-width:940px){.cols{grid-template-columns:1fr}}
.sec-h{font-size:17px;font-weight:700;margin:0 0 12px}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}

/* portfolio category tiles */
.cat{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-radius:var(--r);background:#fff;border:1px solid var(--line);margin-bottom:12px;cursor:pointer;transition:.16s}
.cat:hover{border-color:var(--line-2)}
.cat.on{background:var(--absa);border-color:var(--absa);color:#fff;box-shadow:0 10px 24px -12px rgba(149,5,42,.5)}
.cat .nm{font-weight:700;font-size:15px}
.cat .rt{text-align:right;display:flex;align-items:center;gap:12px}
.cat .rt .lbl{font-size:11.5px;opacity:.85}
.cat .rt .val{font-weight:700;font-size:14.5px}
.cat.on .rt .lbl{color:rgba(255,255,255,.85)}
.cat .chev{opacity:.6}

/* explore card */
.explore{display:flex;align-items:center;gap:0;overflow:hidden;border-radius:var(--r);border:1px solid var(--line);background:#fff;cursor:pointer;transition:.16s}
.explore:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.explore .thumb{width:96px;height:88px;flex:none;background:linear-gradient(135deg,var(--absa),var(--absa-2));display:grid;place-items:center}
.explore .thumb svg{width:38px;height:38px;color:#fff;opacity:.92}
.explore .mid{flex:1;padding:16px 18px}
.explore .mid .s{font-size:12.5px;color:var(--muted)}
.explore .mid .b{font-weight:700;font-size:16px}
.explore .plus{margin:0 20px 0 auto;color:var(--absa)}
.explore .plus svg{width:28px;height:28px}

/* product rows (right column) */
.prod{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-radius:var(--r);background:#fff;border:1px solid var(--line);margin-bottom:12px;cursor:pointer;transition:.16s}
.prod:hover{border-color:var(--line-2);box-shadow:var(--shadow)}
.prod.hasbal{border-left:4px solid var(--absa)}
.prod .nm{font-weight:700;font-size:15px}
.prod .id{font-size:12px;color:var(--muted);margin-top:2px}
.prod .rt{display:flex;align-items:center;gap:14px}
.prod .bal{text-align:right}
.prod .bal .lbl{font-size:11px;color:var(--muted)}
.prod .bal .amt{font-weight:700;font-size:14px}
.search{display:inline-flex;align-items:center;gap:6px;color:var(--absa);font-weight:600;font-size:14px;cursor:pointer}
.search svg{width:16px;height:16px}
.empty-cat{padding:40px 24px;text-align:center;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:var(--r)}

/* ===== fund dashboard ===== */
.back-row{margin-bottom:16px}
.dash-grid{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
@media(max-width:940px){.dash-grid{grid-template-columns:1fr}}
.fund-hero{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:#fff}
.fund-hero .band{background:linear-gradient(100deg,var(--absa),var(--absa-2));color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:15px}
.fund-hero .band .dash{width:22px;height:4px;border-radius:3px;background:rgba(255,255,255,.7)}
.fund-hero .band .sep{opacity:.5;margin:0 2px}
.fund-hero .body{padding:26px 24px 28px;text-align:center}
.fund-hero .avlbl{color:var(--absa);font-weight:600;font-size:13.5px}
.fund-hero .avbal{font-size:34px;font-weight:800;margin-top:2px}
.fund-hero .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0 24px}
.fund-hero .stats .k{font-size:12.5px;color:var(--muted)}
.fund-hero .stats .v{font-weight:700;font-size:15px;margin-top:3px}
.fund-hero .stats .v.pos{color:var(--green)}
.pl-pill{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:700;color:var(--green);background:var(--green-soft);padding:2px 9px;border-radius:20px}
.hero-cta{display:flex;gap:14px;justify-content:center}
.hero-cta .btn{min-width:130px}
.actions-card{padding:22px;margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:var(--r)}
.actions-card h3{font-size:15px;margin-bottom:16px}
.action-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:620px){.action-grid{grid-template-columns:repeat(2,1fr)}}
.action{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 8px;border-radius:14px;transition:.16s;cursor:pointer;border:1.5px solid transparent}
.action:hover{background:var(--tile)}
.action.on{border-color:var(--absa)}
.action .ic{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--absa);display:grid;place-items:center;color:var(--absa)}
.action.on .ic{background:var(--absa);color:#fff}
.action .ic svg{width:22px;height:22px}
.action .lb{font-size:13px;font-weight:600;color:var(--ink-2)}
.action.on .lb{color:var(--absa)}

/* inline panel (Transactions/Statements/Recurring/Account details) */
.inline-panel{margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.ip-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line)}
.ip-head h3{flex:1;font-size:16px}
.ip-head .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}.ip-head .x:hover{background:var(--tile)}
.ip-body{padding:22px}
.kvcol{display:grid;grid-template-columns:1fr 1fr;gap:22px 16px}
.kvcol .k{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
.kvcol .v{font-weight:700;font-size:17px;margin-top:2px}
.kvcol .v.sm{font-size:15px}
.hr{height:1px;background:var(--line);margin:22px 0}
.about-row{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid var(--line);border-radius:12px;cursor:pointer;margin-top:6px}
.about-row:hover{background:var(--tile)}
.about-row .ic{width:36px;height:36px;border-radius:9px;background:#FBEAEE;color:var(--absa);display:grid;place-items:center}
.ip-empty{text-align:center;padding:40px 20px}
.ip-empty .ill{width:120px;height:96px;margin:0 auto 14px;opacity:.4}
.ip-empty p{color:var(--ink);font-weight:600;font-size:15px;margin:0 0 4px}
.ip-empty .s{color:var(--muted);font-weight:400;font-size:13.5px}
.txn{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.txn:last-child{border-bottom:none}
.txn .ic{width:44px;height:44px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;color:var(--absa);flex:none}
.txn .tt{font-weight:700;font-size:14.5px}.txn .td{font-size:12.5px;color:var(--muted)}
.txn .amt{margin-left:auto;text-align:right}
.txn .amt .a{font-weight:700;color:var(--green);font-size:14.5px}.txn .amt .st{font-size:12px;color:var(--muted)}
.mgroup{font-weight:700;font-size:14px;margin:6px 0 4px}
.doc-row{display:flex;align-items:center;gap:12px;padding:15px 0;border-bottom:1px solid var(--line)}
.doc-row:last-child{border:none}
.doc-row .ic{width:34px;height:34px;border-radius:8px;background:#FBEAEE;color:var(--absa);display:grid;place-items:center;font-size:10px;font-weight:800}

/* ===== right drawer ===== */
.scrim{position:fixed;inset:0;background:rgba(16,24,40,.42);opacity:0;pointer-events:none;transition:.25s;z-index:50}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,100vw);background:#F7F8F9;box-shadow:var(--shadow-lg);transform:translateX(102%);transition:.32s cubic-bezier(.2,.8,.2,1);z-index:60;display:flex;flex-direction:column}
.drawer.show{transform:none}
#dwin{flex:1;min-height:0;display:flex;flex-direction:column}
.dh{display:flex;align-items:center;gap:12px;padding:18px 20px;background:#fff}
.dh h3{flex:1;text-align:center;font-size:17px}
.dh .b{width:34px;height:34px;border-radius:10px;display:grid;place-items:center}.dh .b:hover{background:var(--tile)}
.dprog{height:3px;background:var(--line)}.dprog>i{display:block;height:100%;background:var(--absa);transition:width .3s}
.db{flex:0 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;padding:20px;-webkit-overflow-scrolling:touch}
.df{padding:16px 20px;background:#fff;border-top:1px solid var(--line)}
.fl{font-size:13.5px;font-weight:600;color:var(--ink-2);margin:0 0 8px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
.acct{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:14px 16px;margin-bottom:18px}
.acct .an{font-weight:600;font-size:14px}.acct .am{font-size:12px;color:var(--muted)}.acct .ab{margin-left:auto;font-weight:600;font-size:13.5px;color:var(--ink-2)}.acct .cv{color:var(--muted)}
.amt{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.amt .c{font-weight:600;color:var(--muted)}
.amt input{flex:1;border:none;outline:none;font-size:18px;font-weight:700;text-align:right;font-family:inherit;width:100%;background:none;color:var(--ink)}
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{padding:9px 18px;border-radius:999px;background:#F1F1F2;font-size:13.5px;font-weight:600;transition:.15s}
.chip:hover{background:#E7E7E9}.chip.on{background:var(--absa);color:#fff}
.hint{font-size:12.5px;color:var(--muted);margin:8px 0 20px}
.rseg{display:flex;background:#F1F1F2;border-radius:999px;padding:5px;margin-bottom:22px}
.rseg button{flex:1;padding:11px;border-radius:999px;font-size:14px;font-weight:600;color:var(--ink-2);transition:.18s;font-family:inherit}
.rseg button.on{background:var(--absa);color:#fff}
/* account selector dropdown */
.acct-wrap{position:relative;margin-bottom:18px}
.acct-wrap .acct{margin-bottom:0;cursor:pointer}
.acct-wrap.open .acct{border-color:var(--absa)}
.acct-list{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-lg);z-index:5;overflow:hidden}
.acct-opt{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
.acct-opt:last-child{border-bottom:none}
.acct-opt:hover{background:var(--tile)}
.acct-opt.on{background:var(--absa);color:#fff}
.acct-opt .an{font-weight:700;font-size:14px}.acct-opt .am{font-size:12px;opacity:.85}
.acct-opt .ab{margin-left:auto;font-weight:700;font-size:13.5px}
/* day / date pickers */
.day-input{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
.day-input.open{border-color:var(--absa)}
.day-input .val{flex:1;font-size:15px;color:var(--ink)} .day-input .val.ph{color:var(--muted)}
.day-input .cal{color:var(--absa)}.day-input .cal svg{width:20px;height:20px}
.picker{background:#fff;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.picker .opt{padding:15px 18px;font-size:15px;border-bottom:1px solid var(--line);cursor:pointer}
.picker .opt:last-child{border:none}.picker .opt:hover{background:var(--tile)}.picker .opt.on{background:var(--absa);color:#fff;font-weight:600}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:14px}
.daygrid .d{aspect-ratio:1;display:grid;place-items:center;border-radius:9px;font-size:14px;cursor:pointer;transition:.12s}
.daygrid .d:hover{background:var(--tile)}.daygrid .d.on{background:var(--absa);color:#fff;font-weight:700}
.daygrid .d.mut{color:var(--muted-2);cursor:default}.daygrid .d.mut:hover{background:none}
.daygrid .hd{aspect-ratio:auto;font-size:11px;color:var(--muted);font-weight:600;cursor:default}.daygrid .hd:hover{background:none}
.calhead{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px 16px 4px;font-weight:700}
.calhead button{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--absa)}.calhead button:hover{background:var(--tile)}
.qbanner{display:flex;align-items:center;gap:10px;background:#EAF2FB;border:1px solid #CFE1F5;border-radius:12px;padding:12px 14px;font-size:13.5px;color:#1B4E86;margin-bottom:14px}
.qbanner svg{width:18px;flex:none;color:#2C6BB0}
.sumc{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 18px}
.sl{display:flex;justify-content:space-between;padding:14px 0;font-size:14px;border-bottom:1px solid var(--line)}.sl:last-child{border:none}.sl.tot{font-weight:700}.sl .k{color:var(--muted)}
.success{text-align:center;padding:34px 18px}
.sic{width:110px;height:110px;margin:0 auto 18px}
.sic circle{stroke-dasharray:280;stroke-dashoffset:280;animation:dr .6s .1s forwards}.sic path{stroke-dasharray:80;stroke-dashoffset:80;animation:dr .4s .5s forwards}
@keyframes dr{to{stroke-dashoffset:0}}
.disc{display:flex;gap:9px;background:#FFF8EC;border:1px solid #FCE4B6;border-radius:12px;padding:12px 14px;font-size:12px;color:#93610B;line-height:1.5;margin-top:14px}
.disc svg{width:16px;flex:none;margin-top:1px}

/* unit trust details drawer */
.utd-hero{background:linear-gradient(135deg,var(--absa-3),var(--absa-2));height:200px;position:relative;overflow:hidden;display:grid;place-items:center}
.utd-hero .art{width:150px;height:130px;display:grid;place-items:center}
.utd-hero .art svg{width:130px;height:110px}
.utd-hero .dot{position:absolute;color:#fff;opacity:.6;font-size:22px}
.utd-card{background:#fff;padding:22px 22px 6px}
.utd-fund{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.utd-fund .lg{width:52px;height:52px;border-radius:12px;background:#EAF0FA;display:grid;place-items:center}
.utd-fund .lg svg{width:30px;height:30px}
.utd-stats{display:grid;grid-template-columns:1fr 1fr;gap:22px 16px}
.utd-stats .k{font-size:12.5px;color:var(--muted)}.utd-stats .v{font-weight:700;font-size:17px;margin-top:2px}
.feat{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}.feat:last-child{border:none}
.feat .ic{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--absa);display:grid;place-items:center;color:var(--absa);flex:none}
.feat .ic svg{width:19px;height:19px}
.feat .ft{font-weight:600;font-size:14px}.feat .fd{font-size:12.5px;color:var(--muted)}
.kv{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}.kv:last-child{border:none}.kv .k{color:var(--muted)}.kv .v{font-weight:600}
.tc{display:flex;align-items:center;gap:12px;padding:16px 0}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted-2);flex:none;display:grid;place-items:center;cursor:pointer;transition:.15s}
.cb.on{background:var(--absa);border-color:var(--absa)}.cb svg{width:14px;height:14px;color:#fff;opacity:0}.cb.on svg{opacity:1}

/* leave-confirm dialog */
.dlg-scrim{position:fixed;inset:0;background:rgba(16,24,40,.42);z-index:70;display:none;place-items:center}
.dlg-scrim.show{display:grid}
.dlg{background:#fff;border-radius:18px;padding:28px 26px;width:min(340px,90vw);text-align:center;box-shadow:var(--shadow-lg)}
.dlg .warn{width:56px;height:56px;border-radius:50%;background:#FEF3E2;color:#E8830C;display:grid;place-items:center;margin:0 auto 14px}
.dlg h4{font-size:18px;margin-bottom:8px}.dlg p{color:var(--muted);font-size:13.5px;margin:0 0 20px}
.dlg .btn{width:100%;margin-bottom:10px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;z-index:120;box-shadow:var(--shadow-lg);opacity:0;transition:.25s}
.toast.show{opacity:1}

/* ===== proportions + icon fixes to match the OTT app ===== */
svg{flex:none}
.kvcol .k svg,.fl svg,.utd-stats .k svg,.kv .k svg,.info-i svg{width:15px;height:15px;vertical-align:-2px}
.info-i{display:inline-flex;color:var(--muted-2)}
.wrap{max-width:1120px;padding:20px 28px 60px}
.sec-h{font-size:15px;margin-bottom:10px}
.cat{padding:16px 18px}.cat .nm{font-size:14px}.cat .rt .val{font-size:13.5px}.cat .rt .lbl{font-size:11px}
.prod{padding:15px 18px}.prod .nm{font-size:14px}.prod .id{font-size:11.5px}.prod .bal .amt{font-size:13.5px}.prod .bal .lbl{font-size:10.5px}
.explore .thumb{width:84px;height:78px}.explore .mid .b{font-size:15px}.explore .mid .s{font-size:12px}
.fund-hero .band{padding:12px 20px;font-size:14px}
.fund-hero .body{padding:22px 22px 24px}
.fund-hero .avbal{font-size:28px}.fund-hero .avlbl{font-size:12.5px}
.fund-hero .stats{margin:18px 0 20px;gap:10px}.fund-hero .stats .v{font-size:14px}.fund-hero .stats .k{font-size:11.5px}
.hero-cta .btn{min-width:118px;padding:11px 22px;font-size:14.5px}
.hero-cta .btn svg{width:18px;height:18px}
.actions-card{padding:18px}.actions-card h3{font-size:14px;margin-bottom:14px}
.action{padding:16px 6px;gap:8px}.action .ic{width:44px;height:44px}.action .ic svg{width:20px;height:20px}.action .lb{font-size:12.5px}
.ip-head{padding:16px 20px}.ip-head h3{font-size:15px}
.ip-body{padding:20px}
.kvcol{gap:18px 16px}.kvcol .v{font-size:16px}.kvcol .v.sm{font-size:14px}.kvcol .k{font-size:12px}
.dh h3{font-size:16px}.db{padding:18px}
.fl{font-size:13.5px;margin-bottom:7px}
.acct{padding:13px 15px}.acct .an{font-size:13.5px}.acct .am{font-size:11.5px}.acct .ab{font-size:13px}
.amt{padding:14px 16px}.amt input{font-size:17px}.amt .c{font-size:14px}
.amt.err{background:#FDECEE;border-color:#E4577A}
.amt-err{display:flex;align-items:flex-start;gap:7px;color:#C21D3C;font-size:12.5px;margin:0 0 14px;line-height:1.4}
.amt-err svg{width:15px;margin-top:1px}
.chip{padding:8px 16px;font-size:13px}
.btn-lg{padding:13px 20px;font-size:14.5px}
.btn{border-radius:999px}
.utd-hero{height:170px}.utd-hero .art svg{width:110px;height:92px}
.utd-card{padding:20px 20px 4px}.utd-fund .lg{width:46px;height:46px}.utd-fund>div>div:first-child{font-size:16px!important}
.utd-stats .v{font-size:15px}.feat .ft{font-size:13.5px}.feat .fd{font-size:12px}
/* toggle switch */
.tgl{display:flex;align-items:center;gap:12px;margin:18px 0 4px}
.sw{width:44px;height:25px;border-radius:20px;background:#CDD1D6;position:relative;transition:.2s;flex:none;cursor:pointer}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;box-shadow:var(--shadow)}
.sw.on{background:var(--absa)}.sw.on::after{left:22px}
.tgl .t{font-size:13.5px;color:var(--ink-2)}
/* decorative success check */
.dcheck{width:130px;height:130px;margin:6px auto 20px;position:relative}
.succ-amt{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px}
.succ-title{font-size:20px;font-weight:700;text-align:center;line-height:1.25;margin-bottom:8px}
.succ-sub{font-size:13.5px;color:var(--muted);text-align:center;max-width:300px;margin:0 auto 20px;line-height:1.5}
.succ-card{background:#fff;border-radius:14px;padding:6px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.succ-line{display:flex;justify-content:space-between;padding:13px 0;font-size:13.5px;border-bottom:1px solid var(--line)}
.succ-line:last-child{border:none}.succ-line .k{color:var(--muted)}.succ-line .v{font-weight:700}
.info-banner{display:flex;gap:10px;background:#EAF2FB;border:1px solid #CFE1F5;border-radius:12px;padding:13px 15px;font-size:13px;color:#1B4E86;line-height:1.5}
.info-banner svg{width:20px;flex:none;color:#2C6BB0}
/* calendar/pickers: ensure fully scrollable inside drawer */
.picker{max-height:none}
.acct .cv svg,.acct-opt .cv svg{width:18px;height:18px}
.about-row .ic svg,.doc-row .ic{width:auto}.about-row .ic svg{width:18px;height:18px}
/* size all icon-buttons/nav chevrons (fixes oversized back arrow etc.) */
.btn svg,.dh .b svg,.ip-head .x svg,.calhead button svg,.cat .chev svg,.prod .rt .link svg,.search svg,.sec-row .link svg{width:18px;height:18px}
.back-row .btn svg{width:16px;height:16px}
.explore .plus svg{width:26px;height:26px}
</style>
</head>
<body>
<div id="app"></div>
<div class="scrim" id="scrim" onclick="tryClose()"></div>
<div class="drawer" id="drawer"><div id="dwin"></div></div>
<div class="dlg-scrim" id="dlgScrim"><div class="dlg">
  <div class="warn"><svg viewBox="0 0 24 24" fill="none" width="26" height="26"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 18a2 2 0 001.7 3h15.8a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <h4>Are you sure you want to leave?</h4><p>All progress will be lost if you continue.</p>
  <button class="btn btn-primary btn-lg" onclick="confirmLeave()">Continue</button>
  <button class="btn btn-outline btn-lg" onclick="closeDlg()">Cancel</button>
</div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ugx=n=>'UGX '+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ugx0=n=>'UGX '+Number(n||0).toLocaleString('en-US');
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
let _ref='ADJ124129887'; function newRef(){ return _ref; }
const DCHECK='<svg class="dcheck" viewBox="0 0 130 130" fill="none"><circle cx="65" cy="68" r="52" fill="#ECECEE"/><path d="M40 68l16 16 34-38" stroke="#95052A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M96 30l6 3M104 44l7-1M92 20l2 6M28 40l-6-2M20 54l-6 1" stroke="#E8830C" stroke-width="3" stroke-linecap="round"/><circle cx="103" cy="58" r="2.5" fill="#95052A"/><circle cx="30" cy="30" r="2.5" fill="#E8830C"/></svg>';

/* ---------- state ---------- */
const S={
  view:'landing', cat:'unit', panel:null,   // dashboard inline panel: transactions|statements|recurring|account
  fund:{ id:'IN00000079', name:'ABSA Shilingi Fund Portfolio', short:'ABSA Shilingi Fund Portfolio', kind:'Money Market Fund',
    productName:'Sanlam Money Market Fund', manager:'Managed by Sanlam Investments East Africa',
    objectives:'The Sanlam Money Market Fund aims to provide investors with capital preservation, liquidity and competitive returns by investing in high-quality short-term money market instruments.',
    yield:12.5, fundSize:'UGX 85B', rating:'AAA', access:'1 - 2 days',
    available:100000, current:99000, invested:90000, purchase:90000, interest:10000, units:9000, pl:10000, plPct:12.5 },
  accounts:[
    {name:'Absa Business Access Account', mask:'1359', balance:183706603},
    {name:'STAFF SAVINGS - NILE BANK', mask:'5962', balance:41383502854},
    {name:'STAFF SAVE AS YOU EARN', mask:'9851', balance:9900823}
  ],
  fromIdx:0, acctOpen:false, dayOpen:false, calMonth:6, calYear:2026,   // calMonth 0-based (6=July)
  get from(){ return this.accounts[this.fromIdx]; },
  recurring:{ active:false, step:0, amount:0, freq:'Weekly', dayOfWeek:'', dayOfMonth:'', dateStr:'' },
  txns:[],
  drawer:null,   // buy|sell|detail|recsetup
  buy:{step:1,amount:0}, sell:{step:1,amount:0}, detailTC:false, detailProduct:null
};
const MIN=10000;
const BALANCED={ id:'MP00000002', name:'Balanced Growth Portfolio', short:'Balanced Growth', kind:'Model Portfolio',
  yield:12.5, fundSize:'UGX 85B', rating:'AAA', access:'1 - 2 days', opened:false };

/* ---------- icons ---------- */
const IC={
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8" stroke-width="1.8" stroke-linecap="round"/></svg>',
  chevR:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  chevD:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3" stroke-linecap="round"/></svg>',
  buy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg>',
  sell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 12h8" stroke-linecap="round"/></svg>',
  txns:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h13l-3-3M20 17H7l3 3"/></svg>',
  stmt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4" stroke-linecap="round"/></svg>',
  recur:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 018-8 8 8 0 016 2.7M20 12a8 8 0 01-8 8 8 8 0 01-6-2.7"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>',
  acct:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M7 15h4" stroke-linecap="round"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 3v4M16 3v4" stroke-linecap="round"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01" stroke-linecap="round"/></svg>',
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h3" stroke-linecap="round"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L19 7"/></svg>',
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 18a2 2 0 001.7 3h15.8a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/></svg>',
  safe:'<svg viewBox="0 0 130 110" fill="none"><rect x="18" y="14" width="94" height="82" rx="12" fill="#7A0F2C"/><rect x="30" y="26" width="70" height="58" rx="8" fill="#5C0620"/><circle cx="65" cy="55" r="18" fill="none" stroke="#F5A623" stroke-width="3"/><circle cx="65" cy="55" r="5" fill="#F5A623"/><path d="M65 37v-6M65 79v-6M47 55h-6M89 55h-6" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/><rect x="96" y="46" width="5" height="18" rx="2" fill="#F5A623"/></svg>',
  fund:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#3B6FB5" stroke-width="1.7"/><path d="M12 7v10M9 10l3-3 3 3" stroke="#3B6FB5" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  daily:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M8.5 14.5c.5 1 1.7 1.6 3 1.6 1.7 0 3-.8 3-2.1 0-2.8-5.5-1.4-5.5-4 0-1.2 1.2-2 2.8-2 1.2 0 2.3.5 2.8 1.4M12 6v1.5M12 16v1.6" stroke-linecap="round"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/></svg>',
  liq:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 018 0" stroke-linecap="round"/></svg>',
  team:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="9" cy="8" r="3"/><path d="M3 19a6 6 0 0112 0M16 6a3 3 0 010 6M21 19a6 6 0 00-4-5.6" stroke-linecap="round"/></svg>',
  emptycard:'<svg viewBox="0 0 120 96" fill="none"><rect x="18" y="24" width="84" height="52" rx="8" fill="#D3D3D6"/><rect x="28" y="40" width="26" height="8" rx="4" fill="#EDEDEE"/><rect x="28" y="54" width="44" height="6" rx="3" fill="#E2E2E4"/><circle cx="92" cy="24" r="9" fill="#DcDcDf"/><path d="M92 20v8M88 24h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>',
  stmtill:'<svg viewBox="0 0 120 96" fill="none"><circle cx="60" cy="52" r="34" fill="#EDEDEE"/><rect x="44" y="30" width="34" height="44" rx="4" fill="#fff" stroke="#C7C7CB" stroke-width="1.5"/><rect x="50" y="38" width="22" height="3" rx="1.5" fill="#CFCFD3"/><rect x="50" y="45" width="22" height="3" rx="1.5" fill="#DADADE"/><rect x="50" y="52" width="16" height="3" rx="1.5" fill="#DADADE"/><rect x="50" y="59" width="22" height="3" rx="1.5" fill="#DADADE"/></svg>'
};

/* ---------- render ---------- */
function render(){ $('#app').innerHTML = S.view==='dashboard'?viewDash():viewLanding(); try{window.scrollTo({top:0})}catch(e){} }
function go(v){ S.view=v; if(v==='landing'){S.panel=null;} render(); }

/* ---------- LANDING ---------- */
function viewLanding(){
  const cats=[['unit','Unit trusts',ugx(S.fund.available)],['treasury','Treasury bonds','—'],['fixed','Fixed deposit','—']];
  return `<div class="wrap"><div class="cols">
    <div>
      <h2 class="sec-h">Your investment portfolio</h2>
      ${cats.map(c=>`<div class="cat ${S.cat===c[0]?'on':''}" onclick="S.cat='${c[0]}';render()">
        <div class="nm">${c[1]}</div>
        <div class="rt"><div><div class="lbl">Total balance</div><div class="val dnum">${c[2]}</div></div><span class="chev">${IC.chevR}</span></div></div>`).join('')}
      <h2 class="sec-h" style="margin-top:24px">Explore our investment options</h2>
      <div class="explore" onclick="openDetail(BALANCED)"><div class="thumb">${IC.wallet}</div><div class="mid"><div class="s">Open a new</div><div class="b">Investment</div></div><div class="plus">${IC.plus}</div></div>
    </div>
    <div>${rightColumn()}</div>
  </div></div>`;
}
function rightColumn(){
  if(S.cat==='unit'){
    return `<div class="sec-row"><h2 class="sec-h" style="margin:0">Unit Trusts</h2><span class="search" onclick="toast('Search unit trusts')">${IC.search} Search</span></div>
      <div class="prod hasbal" onclick="go('dashboard')">
        <div><div class="nm">${esc(S.fund.name)}</div><div class="id">${esc(S.fund.id)}</div></div>
        <div class="rt"><div class="bal"><div class="lbl">Available balance</div><div class="amt dnum">${ugx(S.fund.available)}</div></div><span class="link">View</span></div></div>
      <div class="prod" onclick="openDetail(BALANCED)"><div class="nm">${esc(BALANCED.name)}</div><span class="link">Open</span></div>`;
  }
  const label=S.cat==='treasury'?'Treasury bonds':'Fixed deposit';
  return `<div class="sec-row"><h2 class="sec-h" style="margin:0">${label}</h2></div>
    <div class="empty-cat">You don't have any ${label.toLowerCase()} yet.<br/><span class="link" onclick="openDetail(BALANCED)">Explore investment options</span></div>`;
}

/* ---------- DASHBOARD ---------- */
function viewDash(){
  const f=S.fund;
  const acts=[['transactions','Transactions',IC.txns],['statements','Statements',IC.stmt],['recurring','Recurring payment',IC.recur],['account','Account details',IC.acct]];
  return `<div class="wrap">
    <div class="back-row"><button class="btn btn-ghost" style="padding:9px 14px" onclick="go('landing')">${IC.back}<span style="margin-left:2px">Investments</span></button></div>
    <div class="dash-grid">
      <div>
        <div class="fund-hero">
          <div class="band"><span class="dash"></span> ${esc(f.short)} <span class="sep">|</span> <span style="font-weight:600">${esc(f.id)}</span></div>
          <div class="body">
            <div class="avlbl">Available balance</div><div class="avbal dnum">${ugx(f.available)}</div>
            <div class="stats">
              <div><div class="k">Current balance</div><div class="v dnum">${ugx(f.current)}</div></div>
              <div><div class="k">Total invested</div><div class="v dnum">${ugx(f.invested)}</div></div>
              <div><div class="k">Profit/loss</div><div class="v pos dnum">+${ugx(f.pl)}</div><div class="pl-pill">↑ +${f.plPct.toFixed(1)}%</div></div>
            </div>
            <div class="hero-cta">
              <button class="btn btn-primary btn-lg" onclick="openDrawer('buy')">${IC.buy} Buy</button>
              <button class="btn btn-outline btn-lg" onclick="openDrawer('sell')">${IC.sell} Sell</button>
            </div>
          </div>
        </div>
        <div class="actions-card">
          <h3>What would you like to do?</h3>
          <div class="action-grid">${acts.map(a=>`<div class="action ${S.panel===a[0]?'on':''}" onclick="togglePanel('${a[0]}')"><div class="ic">${a[2]}</div><div class="lb">${a[1]}</div></div>`).join('')}</div>
        </div>
        ${S.panel?inlinePanel():''}
      </div>
      <div>
        <h2 class="sec-h">Explore our investment options</h2>
        <div class="explore" onclick="openDetail(BALANCED)"><div class="thumb">${IC.wallet}</div><div class="mid"><div class="s">Open a new</div><div class="b">Investment</div></div><div class="plus">${IC.plus}</div></div>
        <div class="sec-row" style="margin-top:20px"><h2 class="sec-h" style="margin:0">Unit trusts</h2><span class="link" onclick="go('landing')">View all</span></div>
        <div class="prod hasbal"><div><div class="nm">${esc(f.name)}</div><div class="id">${esc(f.id)}</div></div>
          <div class="rt"><div class="bal"><div class="lbl">Available balance</div><div class="amt dnum">${ugx(f.available)}</div></div><span class="link">View</span></div></div>
      </div>
    </div>
  </div>`;
}
function togglePanel(p){ S.panel = S.panel===p?null:p; render(); if(S.panel){ setTimeout(()=>{const el=$('#inlinePanel');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);} }
function inlinePanel(){
  const f=S.fund, titles={transactions:'Transactions',statements:'Statements',recurring:'Recurring payments',account:'Account details'};
  let body='';
  if(S.panel==='account'){
    body=`<div class="kvcol">
      <div><div class="k">Current value ${IC.info}</div><div class="v dnum">${ugx(f.current)}</div></div>
      <div><div class="k">Total invested</div><div class="v dnum">${ugx(f.invested)}</div></div>
      <div><div class="k">Annual yield ${IC.info}</div><div class="v">${f.yield}%</div></div>
      <div><div class="k">Interest earned</div><div class="v dnum">${ugx(f.interest)}</div></div>
    </div><div class="hr"></div>
    <div class="kvcol"><div><div class="k">Purchase value</div><div class="v sm dnum">${ugx(f.purchase)}</div></div>
      <div><div class="k">Units</div><div class="v sm">${f.units}</div></div></div>
    <div class="about-row" onclick="openDetail({...S.fund})"><div class="ic">${IC.doc}</div><div style="flex:1"><div style="font-weight:700;font-size:14px">About ${esc(f.short)}</div><div class="muted" style="font-size:12.5px">Learn more about this investment</div></div><span class="link">${IC.chevR}</span></div>`;
  } else if(S.panel==='transactions'){
    body = f.txns0?'':(S.txns.length?txnList():`<div class="ip-empty"><div class="ill">${IC.emptycard}</div><p>No transactions yet</p><div class="s">Your buy and sell activity will appear here.</div></div>`);
    if(S.txns.length) body=txnList();
    else body=`<div class="ip-empty"><div class="ill">${IC.emptycard}</div><p>No transactions yet</p><div class="s">Your buy and sell activity will appear here.</div></div>`;
  } else if(S.panel==='statements'){
    body=`<div class="ip-empty"><div class="ill">${IC.stmtill}</div><p>You don't have any statements at the moment</p><div class="s">Check this space later! Your future statements will be found here.</div></div>`;
  } else if(S.panel==='recurring'){
    if(S.recurring.active){
      const r=S.recurring;
      body=`<div class="sumc">
        <div class="sl"><span class="k">Recurring amount</span><span class="dnum" style="font-weight:700">${ugx(r.amount)}</span></div>
        <div class="sl"><span class="k">Frequency</span><span>${esc(r.freq)}</span></div>
        <div class="sl"><span class="k">Schedule</span><span>${recSchedule(r)}</span></div>
        <div class="sl"><span class="k">From account</span><span>${esc(S.from.name)} ••••${S.from.mask}</span></div></div>
        <button class="btn btn-outline btn-lg btn-block" style="margin-top:16px" onclick="cancelRecurring()">Cancel recurring payment</button>`;
    } else {
      body=`<div class="ip-empty"><div class="ill">${IC.emptycard}</div><p>You don't have any active recurring payments at the moment</p></div>
        <button class="btn btn-primary btn-lg btn-block" onclick="openDrawer('recsetup')">Set up recurring payment</button>`;
    }
  }
  return `<div class="inline-panel" id="inlinePanel"><div class="ip-head"><button class="x" onclick="S.panel=null;render()">${IC.x}</button><h3>${titles[S.panel]}</h3></div><div class="ip-body">${body}</div></div>`;
}
function txnList(){
  return `<div class="mgroup">July 2026</div>`+S.txns.map(t=>`<div class="txn"><div class="ic">${IC.txns}</div><div><div class="tt">${t.type}</div><div class="td">${t.date}</div></div><div class="amt"><div class="a">${t.type==='Sell'?'-':'+'}${ugx(t.amount)}</div><div class="st">${t.status}</div></div></div>`).join('');
}

/* ---------- DRAWER ---------- */
function openDrawer(kind){ S.drawer=kind; S.acctOpen=false; S.dayOpen=false; if(kind==='buy')S.buy={step:1,amount:0,recurring:false}; if(kind==='sell')S.sell={step:1,amount:0}; if(kind==='recsetup'){S.recurring.step=1;} renderDrawer(); $('#scrim').classList.add('show'); $('#drawer').classList.add('show'); }
function dirty(){ return (S.drawer==='buy'&&(S.buy.amount>0||S.buy.step>1)) || (S.drawer==='sell'&&(S.sell.amount>0||S.sell.step>1)) || (S.drawer==='recsetup'&&(S.recurring.amount>0||S.recurring.step>1)); }
function tryClose(){ if(dirty()){ $('#dlgScrim').classList.add('show'); } else closeDrawer(); }
function confirmLeave(){ closeDlg(); closeDrawer(); }
function closeDlg(){ $('#dlgScrim').classList.remove('show'); }
function closeDrawer(){ $('#scrim').classList.remove('show'); $('#drawer').classList.remove('show'); S.drawer=null; }
function renderDrawer(){ const m={buy:dwBuy,sell:dwSell,detail:dwDetail,recsetup:dwRecSetup}; $('#dwin').innerHTML=(m[S.drawer]||(()=>''))(); }
function dh(title,prog,back){ return `<div class="dh">${back?`<button class="b" onclick="${back}">${IC.back}</button>`:'<span style="width:34px"></span>'}<h3>${esc(title)}</h3><button class="b" onclick="tryClose()">${IC.x}</button></div>${prog!=null?`<div class="dprog"><i style="width:${prog}%"></i></div>`:''}`; }

/* ---- account selector (Buy / Sell / Recurring) ---- */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function acctSelector(label){
  const a=S.from;
  return `${label?`<div class="fl">${label}</div>`:''}<div class="acct-wrap ${S.acctOpen?'open':''}">
    <div class="acct" style="margin-bottom:0;cursor:pointer" onclick="S.acctOpen=!S.acctOpen;S.dayOpen=false;renderDrawer()">
      <div><div class="an">${esc(a.name)}</div><div class="am">••••${a.mask}</div></div>
      <div class="ab dnum">${ugx0(a.balance)}</div><span class="cv" style="display:inline-flex;transition:.2s;transform:rotate(${S.acctOpen?180:0}deg)">${IC.chevD}</span></div>
    ${S.acctOpen?`<div class="acct-list">${S.accounts.map((x,i)=>`<div class="acct-opt ${i===S.fromIdx?'on':''}" onclick="event.stopPropagation();S.fromIdx=${i};S.acctOpen=false;renderDrawer()"><div><div class="an">${esc(x.name)}</div><div class="am">••••${x.mask}</div></div><div class="ab dnum">${ugx0(x.balance)}</div></div>`).join('')}</div>`:''}
  </div>`;
}
/* ---- recurring day / date picker (per frequency) ---- */
function dayPicker(){
  const r=S.recurring;
  if(r.freq==='Weekly'){
    return `<div class="fl">Day of the week</div>
      <div class="day-input ${S.dayOpen?'open':''}" onclick="S.dayOpen=!S.dayOpen;S.acctOpen=false;renderDrawer()"><span class="val ${r.dayOfWeek?'':'ph'}">${r.dayOfWeek||'e.g., Monday'}</span><span class="cal">${IC.cal}</span></div>
      ${S.dayOpen?`<div class="picker">${WEEKDAYS.map(d=>`<div class="opt ${r.dayOfWeek===d?'on':''}" onclick="S.recurring.dayOfWeek='${d}';S.dayOpen=false;renderDrawer()">${d}</div>`).join('')}</div>`:''}`;
  }
  if(r.freq==='Monthly'){
    return `<div class="fl">Day of the month</div>
      <div class="day-input ${S.dayOpen?'open':''}" onclick="S.dayOpen=!S.dayOpen;S.acctOpen=false;renderDrawer()"><span class="val ${r.dayOfMonth?'':'ph'}">${r.dayOfMonth?ordinal(+r.dayOfMonth)+' of the month':'e.g., 25th of the month'}</span><span class="cal">${IC.cal}</span></div>
      ${S.dayOpen?`<div class="picker"><div class="daygrid">${Array.from({length:28},(_,i)=>i+1).map(d=>`<div class="d ${(''+r.dayOfMonth)===(''+d)?'on':''}" onclick="S.recurring.dayOfMonth=${d};S.dayOpen=false;renderDrawer()">${d}</div>`).join('')}</div></div>`:''}`;
  }
  return `<div class="qbanner">${IC.info}<span>You will automatically buy units every 3 months.</span></div>
    ${calendarHtml()}
    <div class="day-input" style="margin-top:10px"><span class="val ${r.dateStr?'':'ph'}">${r.dateStr||'DD/MM/YYYY'}</span><span class="cal">${IC.cal}</span></div>`;
}
function calendarHtml(){
  const y=S.calYear,m=S.calMonth, sel=S.recurring.dateStr;
  const startMon=(new Date(y,m,1).getDay()+6)%7, dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const cells=[];
  for(let i=0;i<startMon;i++) cells.push({d:prevDim-startMon+1+i,mut:1});
  for(let d=1;d<=dim;d++) cells.push({d,mut:0});
  let tail=1; while(cells.length%7) cells.push({d:tail++,mut:1});
  const hd=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `<div class="picker"><div class="calhead"><button onclick="calShift(-1)">${IC.back}</button><span>${MONTHS[m]} ${y}</span><button onclick="calShift(1)">${IC.chevR}</button></div>
    <div class="daygrid">${hd.map(h=>`<div class="hd">${h}</div>`).join('')}
    ${cells.map(c=>{ if(c.mut) return `<div class="d mut">${c.d}</div>`; const ds=String(c.d).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')+'/'+y; return `<div class="d ${sel===ds?'on':''}" onclick="S.recurring.dateStr='${ds}';S.recurring.dayOfMonth=${c.d};renderDrawer()">${c.d}</div>`;}).join('')}</div></div>`;
}
function calShift(n){ S.calMonth+=n; if(S.calMonth<0){S.calMonth=11;S.calYear--;} if(S.calMonth>11){S.calMonth=0;S.calYear++;} renderDrawer(); }

/* BUY */
function recNextDate(){ const r=S.recurring; return r.freq==='Quarterly'?(r.dateStr?r.dateStr.replace(/(\d\d)\/(\d\d)\/(\d+)/,'$1 '+MONTHS[+((r.dateStr||'').split('/')[1])-1||0].slice(0,3)+' $3'):'20 Apr 2026') : r.freq==='Weekly'?('Next '+(r.dayOfWeek||'Monday')) : (ordinal(+(r.dayOfMonth||1))+' of next month'); }
function buyValid(){ const b=S.buy; return b.amount>=MIN && b.amount<=S.from.balance && (!b.recurring||recValid({...S.recurring,amount:b.amount})); }
function dwBuy(){
  const b=S.buy,f=S.fund,a=S.from,chips=[10000,50000,100000,500000],over=b.amount>a.balance;
  if(b.step===3) return dh('Buy units',100)+`<div class="db" style="padding:24px 22px">${DCHECK}
    <div class="succ-amt">${ugx(b.amount)}</div>
    <div class="succ-title">${b.recurring?'Buy order and recurring payment set up successfully':'Buy order submitted successfully'}</div>
    <div class="succ-sub">${b.recurring?'Your buy order is being processed, and your recurring payment has been created.':'Your buy order is being processed.'}</div>
    <div class="succ-card"><div class="succ-line"><span class="k">One-time payment</span><span class="v">Pending</span></div>${b.recurring?`<div class="succ-line"><span class="k">Next recurring payment date</span><span class="v">${recNextDate()}</span></div>`:''}<div class="succ-line"><span class="k">Reference</span><span class="v">${newRef()}</span></div></div>
    </div><div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="closeDrawer()">Done</button></div>`;
  if(b.step===2) return dh('Buy units',66,"S.buy.step=1;renderDrawer()")+`<div class="db"><h3 style="margin:0 0 16px">Confirm buy order</h3><div class="sumc">
      <div class="sl"><span class="k">Fund</span><span>${esc(f.short)}</span></div>
      <div class="sl"><span class="k">From account</span><span>${esc(a.name)} ••••${a.mask}</span></div>
      <div class="sl"><span class="k">Buy amount</span><span class="dnum">${ugx(b.amount)}</span></div>
      ${b.recurring?`<div class="sl"><span class="k">Recurring</span><span>${esc(S.recurring.freq)}, ${recSchedule(S.recurring).toLowerCase()}</span></div>`:''}
      <div class="sl tot"><span>Total debit</span><span class="dnum">${ugx(b.amount)}</span></div></div></div>
    <div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="confirmBuy()">Confirm &amp; pay</button></div>`;
  return dh('Buy units',33)+`<div class="db">
    ${acctSelector('From account')}
    <div class="fl">Buy amount</div>
    <div class="amt ${over?'err':''}" id="bAmtBox"><span class="c">UGX</span><input id="bAmt" inputmode="numeric" pattern="[0-9]*" placeholder="0.00" value="${b.amount?b.amount.toLocaleString('en-US'):''}" onkeypress="if(!/[0-9]/.test(event.key))event.preventDefault()" oninput="onBuy(this.value)"></div>
    <div class="amt-err" id="bErr" style="display:${over?'flex':'none'}">${IC.warn}<span>Entered amount exceeds your account's available balance</span></div>
    <div class="hint" id="bHint" style="display:${over?'none':'block'}">Minimum of ${ugx(MIN)}</div>
    <div class="chips">${chips.map(c=>`<button class="chip ${b.amount===c?'on':''}" onclick="S.buy.amount=${c};renderDrawer()">${c/1000}k</button>`).join('')}</div>
  </div><div class="df"><button class="btn btn-primary btn-lg btn-block" id="bCont" ${buyValid()?'':'disabled'} onclick="S.buy.step=2;renderDrawer()">Continue</button></div>`;
}
function onBuy(v){const n=parseInt(String(v).replace(/[^0-9]/g,''))||0;S.buy.amount=n;const el=$('#bAmt');if(el)el.value=n?n.toLocaleString('en-US'):'';const over=n>S.from.balance;const box=$('#bAmtBox');if(box)box.classList.toggle('err',over);const er=$('#bErr'),hi=$('#bHint');if(er)er.style.display=over?'flex':'none';if(hi)hi.style.display=over?'none':'block';const c=$('#bCont');if(c)c.disabled=!buyValid();document.querySelectorAll('.chips .chip').forEach(x=>x.classList.remove('on'));}
function confirmBuy(){const n=S.buy.amount;S.from.balance-=n;S.fund.available+=n;S.fund.current+=n;S.fund.invested+=n;S.fund.purchase+=n;S.fund.units+=Math.round(n/10);if(S.buy.recurring){S.recurring.active=true;S.recurring.amount=n;}S.txns.unshift({type:'One-time deposit',amount:n,date:'6 Jul',status:'Pending Confirmation'});S.buy.step=3;renderDrawer();}

/* SELL */
function dwSell(){
  const s=S.sell,f=S.fund;
  if(f.available<=0) return dh('Sell units')+`<div class="db"><div class="success" style="padding-top:20px"><div style="width:64px;height:64px;border-radius:50%;background:var(--tile);display:grid;place-items:center;margin:0 auto 16px;color:var(--muted-2)">${IC.sell}</div><h4>No active holdings</h4><p class="muted" style="max-width:280px;margin:0 auto">You don't have any active investments to sell. Make a deposit to get started.</p></div></div><div class="df" style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-primary btn-lg btn-block" onclick="openDrawer('buy')">Buy units</button><button class="btn btn-outline btn-lg btn-block" onclick="closeDrawer()">Back to dashboard</button></div>`;
  if(s.step===3) return dh('Sell units',100)+`<div class="db" style="padding:24px 22px">${DCHECK}
    <div class="succ-amt">${ugx(s.amount)}</div>
    <div class="succ-title">Sell order submitted successfully</div>
    <div class="succ-sub">Your sell order is being processed.</div>
    <div class="succ-card"><div class="succ-line"><span class="k">Sell order status</span><span class="v">Pending</span></div><div class="succ-line"><span class="k">Reference</span><span class="v">${newRef()}</span></div></div>
    <div class="info-banner">${IC.info}<span>Your sell order will take 1-2 working days. You'll receive a notification once you receive the funds in your account.</span></div>
    </div><div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="closeDrawer()">Done</button></div>`;
  if(s.step===2) return dh('Sell units',66,"S.sell.step=1;renderDrawer()")+`<div class="db"><h3 style="margin:0 0 16px">Confirm sell order</h3><div class="sumc"><div class="sl"><span class="k">Fund</span><span>${esc(f.short)}</span></div><div class="sl"><span class="k">To account</span><span>${esc(S.from.name)} ••••${S.from.mask}</span></div><div class="sl tot"><span>You receive</span><span class="dnum">${ugx(s.amount)}</span></div></div></div><div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="confirmSell()">Confirm sale</button></div>`;
  const over=s.amount>f.available, ok=s.amount>0&&!over;
  return dh('Sell units',33)+`<div class="db"><div class="fl">Available to sell</div><div class="acct"><div><div class="an dnum">${ugx(f.available)}</div><div class="am">${esc(f.short)}</div></div><button class="link" style="margin-left:auto" onclick="S.sell.amount=${f.available};renderDrawer()">Sell all</button></div>
    <div class="fl">Sell amount</div><div class="amt ${over?'err':''}" id="sAmtBox"><span class="c">UGX</span><input id="sAmt" inputmode="numeric" pattern="[0-9]*" placeholder="0.00" value="${s.amount?s.amount.toLocaleString('en-US'):''}" onkeypress="if(!/[0-9]/.test(event.key))event.preventDefault()" oninput="onSell(this.value)"></div>
    <div class="amt-err" id="sErr" style="display:${over?'flex':'none'};margin-bottom:14px">${IC.warn}<span>Amount exceeds your available balance</span></div>
    ${acctSelector('To account')}
    <div class="sumc"><div class="sl tot"><span>You receive</span><span class="dnum" id="sRecv">${ugx(s.amount)}</span></div></div></div>
    <div class="df"><button class="btn btn-primary btn-lg btn-block" id="sCont" ${ok?'':'disabled'} onclick="S.sell.step=2;renderDrawer()">Continue</button></div>`;
}
function onSell(v){const n=parseInt(String(v).replace(/[^0-9]/g,''))||0;S.sell.amount=n;const el=$('#sAmt');if(el)el.value=n?n.toLocaleString('en-US'):'';const over=n>S.fund.available;const box=$('#sAmtBox');if(box)box.classList.toggle('err',over);const er=$('#sErr');if(er)er.style.display=over?'flex':'none';$('#sRecv').textContent=ugx(n);$('#sCont').disabled=!(n>0&&!over);}
function confirmSell(){const n=S.sell.amount;S.fund.available-=n;S.fund.current-=n;S.fund.invested=Math.max(0,S.fund.invested-n);S.from.balance+=n;S.txns.unshift({type:'Withdrawal',amount:n,date:'6 Jul',status:'Processing'});S.sell.step=3;renderDrawer();}

/* UNIT TRUST DETAILS (drawer) */
function openDetail(prod){ S.drawer='detail'; S.detailProduct=prod; S.detailTC=false; renderDrawer(); $('#scrim').classList.add('show'); $('#drawer').classList.add('show'); }
function dwDetail(){
  const p=S.detailProduct||S.fund;
  const pn=p.productName||p.name, mgr=p.manager||p.kind, obj=p.objectives||'';
  const feats=[['Daily interest accrual','Interest calculated and credited daily',IC.daily],['Capital preservation','Low-risk investment in quality instruments',IC.shield],['High liquidity','Access your funds within 1-2 business days',IC.liq],['Professional management',"Managed by Sanlam's experienced team",IC.team]];
  return `<div class="dh"><button class="b" onclick="closeDrawer()">${IC.back}</button><h3>Unit trust details</h3><button class="b" onclick="closeDrawer()">${IC.x}</button></div>
  <div class="db" style="padding:0">
    <div class="utd-hero"><div class="art">${IC.safe}</div><span class="dot" style="top:34px;left:24%">+</span><span class="dot" style="top:60px;right:20%">+</span><span class="dot" style="bottom:34px;left:44%">•</span></div>
    <div class="utd-card">
      <div class="utd-fund"><div class="lg">${IC.fund}</div><div><div style="font-weight:700;font-size:18px">${esc(pn)}</div><div class="muted" style="font-size:13px">${esc(mgr)}</div></div></div>
      <div class="utd-stats"><div><div class="k">Annual yield</div><div class="v">${p.yield}%</div></div><div><div class="k">Fund size</div><div class="v">${esc(p.fundSize)}</div></div><div><div class="k">Credit rating</div><div class="v">${esc(p.rating)}</div></div><div><div class="k">Access</div><div class="v">${esc(p.access)}</div></div></div>
    </div>
    ${obj?`<div style="padding:22px 22px 4px"><h3 style="font-size:16px;color:var(--absa);margin-bottom:8px">Investment objectives</h3><p style="font-size:13.5px;color:var(--ink-2);line-height:1.6;margin:0">${esc(obj)}</p></div>`:''}
    <div style="padding:18px 22px 4px"><h3 style="font-size:16px;color:var(--absa);margin-bottom:6px">Key features</h3>${feats.map(ft=>`<div class="feat"><div class="ic">${ft[2]}</div><div><div class="ft">${ft[0]}</div><div class="fd">${ft[1]}</div></div></div>`).join('')}</div>
    <div style="padding:12px 22px 4px"><h3 style="font-size:16px;color:var(--absa);margin-bottom:6px">Fee structure</h3><div class="kv"><span class="k">Management fee</span><span class="v">1.0% p.a.</span></div><div class="kv"><span class="k">Entry fee</span><span class="v">None</span></div><div class="kv"><span class="k">Exit fee</span><span class="v">None</span></div></div>
    <div style="padding:8px 22px 4px"><div class="doc-row" onclick="toast('Factsheet opened')"><div class="ic">PDF</div><div style="flex:1"><div style="font-weight:600;font-size:14px">View factsheet</div></div><span class="link">${IC.chevR}</span></div></div>
    <div style="padding:0 22px 8px"><div class="tc"><div class="cb ${S.detailTC?'on':''}" id="tcBox" onclick="S.detailTC=!S.detailTC;document.getElementById('tcBox').classList.toggle('on',S.detailTC);document.getElementById('oi').disabled=!S.detailTC">${IC.check}</div><div style="font-size:14px">I accept the <span class="link" onclick="toast('Terms and conditions')">Terms and conditions</span></div></div></div>
  </div>
  <div class="df"><button class="btn btn-primary btn-lg btn-block" id="oi" ${S.detailTC?'':'disabled'} onclick="openInvestment()">Open investment</button></div>`;
}
function openInvestment(){ closeDrawer(); go('dashboard'); toast('Investment opened. Make your first deposit to start earning.'); setTimeout(()=>openDrawer('buy'),400); }

/* RECURRING SETUP (drawer) */
const WEEKDAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function recSchedule(r){ return r.freq==='Weekly'?('Every '+(r.dayOfWeek||'week')) : r.freq==='Monthly'?('Monthly on the '+(r.dayOfMonth?ordinal(+r.dayOfMonth):'set day')) : ('Quarterly from '+(r.dateStr||'set date')); }
function recValid(r){ return r.amount>=MIN && (r.freq==='Weekly'?!!r.dayOfWeek : r.freq==='Monthly'?!!r.dayOfMonth : !!r.dateStr); }
function dwRecSetup(){
  const r=S.recurring,chips=[10000,50000,100000,500000];
  if(r.step===3) return dh('Recurring payment',100)+`<div class="db"><div class="success"><svg class="sic" viewBox="0 0 110 110" fill="none"><circle cx="55" cy="55" r="50" stroke="#158B3A" stroke-width="5"/><path d="M33 56l15 15 29-31" stroke="#158B3A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg><h4>Recurring payment set up</h4><p class="muted" style="max-width:300px;margin:0 auto">${ugx(r.amount)} will be invested ${recSchedule(r).toLowerCase()} into the ${esc(S.fund.short)} from your ${esc(S.from.name)} ••••${S.from.mask}.</p></div></div><div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="finishRecSetup()">Done</button></div>`;
  if(r.step===2) return dh('Recurring payment',100,"S.recurring.step=1;renderDrawer()")+`<div class="db"><h3 style="margin:0 0 16px">Confirm recurring payment</h3><div class="sumc"><div class="sl"><span class="k">Fund</span><span>${esc(S.fund.short)}</span></div><div class="sl"><span class="k">Buy amount</span><span class="dnum">${ugx(r.amount)}</span></div><div class="sl"><span class="k">Frequency</span><span>${esc(r.freq)}</span></div><div class="sl"><span class="k">Schedule</span><span>${recSchedule(r)}</span></div><div class="sl"><span class="k">From account</span><span>${esc(S.from.name)} ••••${S.from.mask}</span></div><div class="sl tot"><span>Total debit</span><span class="dnum">${ugx(r.amount)}</span></div></div><div class="disc"><svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 18a2 2 0 001.7 3h15.8a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="1.8"/></svg><span>You authorise ABSA to debit ${ugx(r.amount)} ${recSchedule(r).toLowerCase()} and invest it in the ${esc(S.fund.short)}. Cancel anytime.</span></div></div><div class="df"><button class="btn btn-primary btn-lg btn-block" onclick="activateRecurring()">Confirm &amp; set up</button></div>`;
  return dh('Recurring payment',50)+`<div class="db">
    <div class="fl" style="font-size:15px;font-weight:700;color:var(--ink)">How often do you want to buy units?</div>
    <div class="rseg">${['Weekly','Monthly','Quarterly'].map(f=>`<button class="${r.freq===f?'on':''}" onclick="S.recurring.freq='${f}';S.dayOpen=false;renderDrawer()">${f}</button>`).join('')}</div>
    ${acctSelector('From account')}
    <div class="fl">Buy amount</div><div class="amt"><span class="c">UGX</span><input id="rAmt" inputmode="numeric" pattern="[0-9]*" placeholder="0.00" value="${r.amount?r.amount.toLocaleString('en-US'):''}" onkeypress="if(!/[0-9]/.test(event.key))event.preventDefault()" oninput="onRec(this.value)"></div>
    <div class="chips">${chips.map(c=>`<button class="chip ${r.amount===c?'on':''}" onclick="S.recurring.amount=${c};renderDrawer()">${c/1000}K</button>`).join('')}</div>
    <div class="hint">Minimum of ${ugx(MIN)}</div>
    ${dayPicker()}
    <div class="sumc"><div class="sl"><span class="k">Buy amount</span><span class="dnum" id="rSum">${ugx(r.amount)}</span></div><div class="sl tot"><span>Total debit</span><span class="dnum" id="rTot">${ugx(r.amount)}</span></div></div>
  </div><div class="df"><button class="btn btn-primary btn-lg btn-block" id="rCont" ${recValid(r)?'':'disabled'} onclick="S.recurring.step=2;renderDrawer()">Continue</button></div>`;
}
function refreshRec(){const c=$('#rCont');if(c)c.disabled=!recValid(S.recurring);}
function onRec(v){const n=parseInt(String(v).replace(/[^0-9]/g,''))||0;S.recurring.amount=n;const el=$('#rAmt');if(el)el.value=n?n.toLocaleString('en-US'):'';$('#rSum').textContent=ugx(n);$('#rTot').textContent=ugx(n);refreshRec();document.querySelectorAll('.chips .chip').forEach(x=>x.classList.remove('on'));}
function activateRecurring(){ S.recurring.active=true; S.recurring.step=3; renderDrawer(); }
function finishRecSetup(){ S.recurring.step=0; closeDrawer(); S.panel='recurring'; render(); }
function cancelRecurring(){ Object.assign(S.recurring,{active:false,step:0,amount:0,dayOfWeek:'',dayOfMonth:''}); render(); toast('Recurring payment cancelled'); }

render();
</script>
</body>
</html>
